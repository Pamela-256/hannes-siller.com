{% extends "layout.html" %}

{% block content %}
    <h2>{{ display_title }}</h2>
    <p>{{ description|safe }}</p>
    <a href="{{ url_for('index') }}">Back Home</a>

    <div class="gallery">
    {% for img in images %}
        {% if name %}
        <a href="{{ url_for('static', filename='projects/' + category + '/' + name + '/' + img) }}" 
           data-fslightbox="gallery">
        {% else %}
        <a href="{{ url_for('static', filename='projects/' + category + '/' + img) }}" 
           data-fslightbox="gallery">
        {% endif %}
            <img src="{% if name %}{{ url_for('static', filename='projects/' + category + '/' + name + '/' + img) }}{% else %}{{ url_for('static', filename='projects/' + category + '/' + img) }}{% endif %}" 
                alt="{{ display_title }}">
        </a>
    {% endfor %}
</div>
{% endblock %}
