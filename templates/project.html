{% extends "layout.html" %}

{% block content %}
    <h2>{{ display_title }}</h2>
    <p>{{ description }}</p>
    <a href="{{ url_for('index') }}">Back Home</a>

    <div class="gallery">
        {% for img in images %}
        <!-- Note the path includes the 'category' variable now -->
        <a href="{{ url_for('static', filename='projects/' + category + '/' + name + '/' + img) }}">
            <img src="{{ url_for('static', filename='projects/' + category + '/' + name + '/' + img) }}" alt="Photography">
        </a>
        {% endfor %}
    </div>
{% endblock %}
