
{% extends "layout.html" %}

{% block content %}
<h1>Project: {{ name }}</h1>
<a href="{{ url_for('index') }}">Back Home</a>
<div class="gallery">
    {% for img in images %}
    <a href="{{ url_for('static', filename='projects/' + name + '/' + img) }}">
        <img src="{{ url_for('static', filename='projects/' + name + '/' + img) }}" alt="Photography">
    </a>
    {% endfor %}
</div>

{% endblock %}
