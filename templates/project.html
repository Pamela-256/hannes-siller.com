{% extends "layout.html" %}

{% block content %}
    <h2>{{ display_title }}</h2>
    <p>{{ description|safe }}</p>
    <a href="{{ url_for('index') }}">Back Home</a>

    <div class="gallery justified-gallery" data-gallery-container>
    {% for img in images %}
        {% if name %}
        <a href="{{ url_for('static', filename='projects/' + category + '/' + name + '/' + img) }}" 
           data-fslightbox="gallery" class="gallery-item">
        {% else %}
        <a href="{{ url_for('static', filename='projects/' + category + '/' + img) }}" 
           data-fslightbox="gallery" class="gallery-item">
        {% endif %}
            <img src="{% if name %}{{ url_for('static', filename='projects/' + category + '/' + name + '/' + img) }}{% else %}{{ url_for('static', filename='projects/' + category + '/' + img) }}{% endif %}" 
                alt="{{ display_title }}" class="gallery-img">
        </a>
    {% endfor %}
</div>

<script>
// Justified Image Grid Implementation
class JustifiedGallery {
    constructor(container) {
        this.container = container;
        this.items = Array.from(container.querySelectorAll('.gallery-item'));
        this.gap = 15; // Gap between images
        this.rowHeight = 200; // Target row height
        this.currentY = 0; // Track vertical position
        this.init();
    }

    init() {
        if (this.items.length === 0) return;
        
        // Wait for images to load
        const loadPromises = this.items.map(item => {
            const img = item.querySelector('.gallery-img');
            if (img.complete) return Promise.resolve();
            return new Promise(resolve => {
                img.addEventListener('load', resolve);
                img.addEventListener('error', resolve); // Handle errors too
            });
        });

        Promise.all(loadPromises).then(() => this.layout());
        
        // Re-layout on window resize
        window.addEventListener('resize', () => this.debounceLayout());
    }

    debounceLayout() {
        clearTimeout(this.resizeTimeout);
        this.resizeTimeout = setTimeout(() => {
            this.currentY = 0; // Reset vertical position
            this.layout();
        }, 100);
    }

    layout() {
        const containerWidth = this.container.clientWidth;
        let currentRow = [];
        let currentRowAspectRatio = 0;
        
        // Reset all items
        this.items.forEach(item => {
            const img = item.querySelector('.gallery-img');
            img.style.width = '';
            img.style.height = '';
            item.style.width = '';
            item.style.height = '';
            item.style.position = '';
            item.style.top = '';
            item.style.left = '';
        });

        // Group items into rows
        for (let i = 0; i < this.items.length; i++) {
            const item = this.items[i];
            const img = item.querySelector('.gallery-img');
            const aspectRatio = img.naturalWidth / img.naturalHeight;
            
            // Calculate what width this image would have at target row height
            const targetWidth = this.rowHeight * aspectRatio;
            
            // If adding this image would exceed container width, finalize current row
            if (currentRow.length > 0 && 
                this.calculateRowWidth(currentRow) + targetWidth + (currentRow.length * this.gap) > containerWidth) {
                this.layoutRow(currentRow, containerWidth);
                currentRow = [];
                currentRowAspectRatio = 0;
            }
            
            currentRow.push({item, img, aspectRatio});
            currentRowAspectRatio += aspectRatio;
        }
        
        // Layout the last row
        if (currentRow.length > 0) {
            this.layoutRow(currentRow, containerWidth);
        }
        
        // Set final container height
        this.container.style.height = `${this.currentY}px`;
    }

    calculateRowWidth(rowItems) {
        // Calculate what the total width would be at target row height
        return rowItems.reduce((sum, {aspectRatio}) => sum + (this.rowHeight * aspectRatio), 0);
    }

    layoutRow(rowItems, containerWidth) {
        // Calculate total aspect ratio for the row
        const totalAspectRatio = rowItems.reduce((sum, item) => sum + item.aspectRatio, 0);
        
        // Calculate actual row height based on container width
        const gaps = (rowItems.length - 1) * this.gap;
        const actualRowHeight = (containerWidth - gaps) / totalAspectRatio;
        
        let currentX = 0;
        
        // Position each item in the row
        rowItems.forEach(({item, img, aspectRatio}) => {
            const itemWidth = actualRowHeight * aspectRatio;
            
            // Set dimensions
            img.style.width = `${itemWidth}px`;
            img.style.height = `${actualRowHeight}px`;
            
            item.style.width = `${itemWidth}px`;
            item.style.height = `${actualRowHeight}px`;
            item.style.position = 'absolute';
            item.style.top = `${this.currentY}px`;
            item.style.left = `${currentX}px`;
            
            currentX += itemWidth + this.gap;
        });
        
        // Update vertical position for next row
        this.currentY += actualRowHeight + this.gap;
        
        // Set container properties
        this.container.style.position = 'relative';
    }
}

// Initialize gallery when DOM is loaded
document.addEventListener('DOMContentLoaded', () => {
    const galleries = document.querySelectorAll('[data-gallery-container]');
    galleries.forEach(gallery => new JustifiedGallery(gallery));
});
</script>
{% endblock %}
